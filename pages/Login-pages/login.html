<!DOCTYPE html>
<html>
<head>
    <title>Queueless | Admin Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../assets/css/login.css">
    <style>
        .back-home {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 10;
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            text-decoration: none;
            font-weight: 600;
            backdrop-filter: blur(6px);
            transition: background 0.2s;
        }
        .back-home:hover { background: rgba(255,255,255,0.25); }
    </style>
</head>
<body>

<img src="../../assets/images/wmsu.jpg" alt="WMSU Background"
    style="width:100%; height:100%; object-fit:cover; position:fixed; top:0; left:0; z-index:-1; filter: brightness(0.6);">

<a href="../../index.html" class="back-home">← Back to Home</a>

<div class="card">
    <div class="logo-container">
        <img src="../../assets/images/UEUELESS.png" alt="Queueless Logo" class="logo" style="max-width: 150px;">
    </div>
    <div class="form-container">
        <div class="form-title">
            <h2>Staff Login</h2>
            <p class="sub">Enter your WMSU administrative credentials</p>
        </div>
        <form id="loginForm">
            <label>Email</label>
            <input type="email" name="email" placeholder="admin@wmsu.edu.ph" required>
            <label>Password</label>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn">Login</button>
        </form>
        <p style="text-align:left; margin-top:12px;">
            <a href="forgot-pass.html" style="color: #8B0000; font-weight:600; text-decoration:none; ">Forgot Password?</a>
        </p>
        <p style="text-align:center; margin-top:16px;">
            <a href="register.html" style="color: #8B0000; font-weight:600; text-decoration:none;">Create Staff Account</a>
        </p>
    </div>
</div>

<script src="../../assets/js/login.js"></script>
</body>
</html>
