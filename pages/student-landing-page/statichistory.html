<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queueless | History</title>
    <link rel="stylesheet" href="../../assets/css/history.css">
    <style>
        .clear-history-btn {
            display: block;
            margin: 12px auto;
            padding: 8px 20px;
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .clear-history-btn:hover { background: #b91c1c; }
        .history-list { max-height: 60vh; overflow-y: auto; }
    </style>
</head>
<body>
  <nav>
    <button class="hamburger" id="ham" aria-label="Open menu">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </button>
    <a href="../../index.html" class="nav-logo-link">
        <img src="../../assets/images/UEUELESS.png" alt="QueueLess | WMSU" class="nav-logo-img">
    </a>
    <div class="overlay" id="overlay"></div>
    <div class="sidebar" id="sidebar">
        <div class="sb-header">
            <span class="sb-title">Menu</span>
            <button class="close-btn" aria-label="Close">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
        <div class="profile-section">
            <div class="avatar">JD</div>
            <div class="profile-name">Juan dela Cruz</div>
            <div class="profile-email">juan@school.edu.ph</div>
        </div>
        <div class="section-label">Navigation</div>
        <a href="../../index.html" class="nav-item">Dashboard</a>
        <a href="statichistory.html" class="nav-item active">History</a>
        <div class="sb-footer">
            <a href="../Login-pages/login.html" class="nav-item logout">Log in as admin</a>
        </div>
    </div>
  </nav>

  <div class="main-layout">
    <aside class="history-panel">
        <div class="history-header">
            <h3>Queue History</h3>
            <span class="history-badge">0</span>
        </div>
        <div class="history-list" id="historyList"></div>
        <button class="clear-history-btn" id="clearHistoryBtn">Clear All History</button>
    </aside>
  </div>

  <script src="../../assets/js/history.js"></script>
</body>
</html>
