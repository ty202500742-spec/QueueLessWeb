<!DOCTYPE html>
<html>
<head>
    <title>Queueuless | WMSU Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }
        
        .navbar {
            background-color: #8B0000;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            width: 100%;
            max-width: 400px;
            margin: 50px auto;
            background-color: white;
            padding: 60px;
            border-radius: 8px;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #8B0000;
        }

        input {
        
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            
        }

        button {
            width: 100%;
            padding: 10px;
            margin: 10px ;
            background-color: #8B0000;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

      
    
   

    </style>
</head>

<body>

<div class="navbar">
    Queueless | WMSU
</div>

<div class="container" id="loginBox">
    <h2>Student Login</h2>
    <input type="text" id="studentId" placeholder="Student ID">
    <input type="text" id="name" placeholder="Full Name">
   <button onclick="location.href='main.html'">Login</button>
</div>

    

</body>
</html>
