<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Sign-up.css">
    <title>Document</title>
</head>
<body>
    <div class="student-form">
        <div class="form-title">
            <h2>Non-student Login</h2>
            <p class="sub">Enter your information</p>
        </div>

        <form action="../student-landing-page/main.html" method="get">
            <label>First Name</label>
            <input type="text" placeholder="juan" required>

            <label>Last Name</label>
            <input type="text" placeholder="dela cruz" required>

            <label>Middle Name</label>
            <input type="text" placeholder="(optional)">


            <label>Contact Number</label>
            <input type="text" placeholder="123-456-7890" required>
            
            <label>date of birth</label>
            <input type="date" required>

            <label>Email</label>
            <input type="email" placeholder="name@youremail.com" required>

            <label>Password</label>
            <input type="password" placeholder="Password" required>

            <label>Confirm Password</label>
            <input type="password" placeholder="Confirm Password" required>
             
            <button type="submit" class="btn">Sign up</button>
        </form>
    </div>
</body>
</html>
