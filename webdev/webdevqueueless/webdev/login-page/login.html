<!DOCTYPE html>
<html>

<head>
    <title>Queueless | WMSU Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/login.css">
</head>

<body>

    <img src="../assets/images/wmsu.jpg" alt="WMSU Background"
        style="width:100%; height:100%; object-fit:cover; position:fixed; top:0; left:0; z-index:-1;">

    <input type="radio" name="tab" id="toggle-student" checked>
    

    <div class="card">

        <div class="logo-container">
            <img src="../assets/images/queueless.png" alt="Queueless Logo" class="logo">
        </div>

        <div class="toggle">
            <label for="toggle-student"></label>
            
        </div>

        <div class="student-form">
            <div class="form-title">
                <h2>Login</h2>
                <p class="sub">Enter your WMSU credentials</p>
            </div>

            <form action="../student-landing-page/main.html" method="get">
                <label>Email</label>
                <input type="email" placeholder="student@wmsu.edu.ph" required>

                <label>Password</label>
                <input type="password" placeholder="Password" required>
                <button type="submit" class="btn">Login as Student</button>
                <a href="nonS-login.html" class="nonsignup">dont have an account? sign up</a>
            </form>
        </div>

        
    </div>

</body>

</html>
