<!DOCTYPE html>
<html>
<head>
    
    <title>Queueuless | WMSU Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">


</body>
</html>


 <style>
        * { 
box-sizing: border-box; 
margin: 0; 
padding: 0; 
}

        body {
 font-family: Arial, sans-serif; 
background: white;
 min-height: 100vh;
 display: flex;
 align-items: center; 
justify-content: center; 
padding: 20px; 
flex-direction: column;
 }

        .card { 
background: rgb(246, 115, 115); 
border-radius: 16px; 
padding: 32px;
 width: 100%; 
max-width: 420px;
 box-shadow: 0 4px 20px rgba(0,0,0,0.08);
 }
        .toggle { 
display: flex; 
background: maroon;
 border-radius: 10px;
 padding: 4px;
 margin-bottom: 24px;
 gap: 4px;
 }
        .toggle button { 
flex: 1; 
padding: 9px;
 border: none;
 border-radius: 8px;
 font-size: 14px;
 font-weight: 600;
 cursor: pointer; 
background: transparent;
 color: #666;
 }
        .toggle button.active { 
background: white;
 color: #111;
 box-shadow: 0 1px 4px rgba(0,0,0,0.1);
 }
        .toggle button.admin-active {
 background: #d70808;
 color: white;
 }
        h2 {
 font-size: 18px; 
font-weight: 700; 
margin-bottom: 4px;
 } 
.sub {
 font-size: 13px; 
color: #666;
 margin-bottom: 20px;
 }
        .label {
 display: block;
 font-size: 13px; 
font-weight: 600;
 margin-bottom: 5px;
 margin-top: 12px; 
}
        input { 

width: 100%; 
padding: 10px 12px; 
border: 1.5px solid #e5e7eb;
 border-radius: 8px;
 font-size: 14px;
 outline: 
none; 
}
        input:focus {
 border-color: #8B0000;
 }
        .err {
 display: none; 
background: #fef2f2;
 border: 1px solid #fecaca;
 color: #991b1b; 
font-size: 13px;
 padding: 9px 12px; 
border-radius: 8px;
 margin-top: 10px;
 }
        .btn { 
width: 100%;
 padding: 12px;
 background: maroon;
 color: white;
 border: none;
 border-radius: 8px;
 font-size: 15px; 
font-weight: 700;
 cursor: pointer;
 margin-top: 16px;
 }
        .btn.admin {
 background: #8B0000;
 }
        .hint {
 margin-top: 14px; 
background: #fff5f5; 
border: 1px solid #fecaca;
 border-radius: 8px; 
padding: 12px; 
font-size: 12px;
 color: #7a0000;
 line-height: 1.8;
 }
        .hint strong {
 display: block; 
margin-bottom: 2px; }
    </style>
</head>
<body>
 
    
     
<div class="card">
    <div class="toggle">
        <button type="button" id="btnS" class="active" onclick="sw('student')">Student</button>
        <button type="button" id="btnA" onclick="sw('admin')">Admin</button>
    </div>

    <h2 id="ttl">Student Login</h2>
    <p class="sub" id="sub">Enter your WMSU credentials</p>
    <form id="frm">
        <div id="eWrap"><label>Email</label><input type="email" id="email" placeholder="student@wmsu.edu.ph"></div>
        <div id="uWrap" style="display:none"><label>Username</label><input type="text" id="uname" placeholder="Admin username" autocomplete="off"></div>
        <label>Password</label>
        <input type="password" id="pw" placeholder="Password">
        <div class="err" id="err"></div>
        <button type="submit" class="btn" id="sbtn">Login as Student</button>
    </form>
    <div class="hint" id="hint"><strong>Demo:</strong> juandelacruz@wmsu.edu.ph | any password</div>
</div>
<script>
    let role='student';
    const admins=[
        {u:'admin',p:'wmsu2026',n:'System Admin',r:'Superadmin'},
        {u:'window1',p:'teller1',n:'Teller - Window 1',r:'Enrollment Assistance'},
        {u:'window2',p:'teller2',n:'Teller - Window 2',r:'Payments'},
        {u:'window3',p:'teller3',n:'Teller - Window 3',r:'Documents'},
        {u:'window4',p:'teller4',n:'Teller - Window 4',r:'Aptitude Tests'},
        {u:'window5',p:'teller5',n:'Teller - Window 5',r:'Other Services'}
    ];
    function sw(r){
        role=r; const a=r==='admin';
        document.getElementById('btnS').className=a?'':'active';
        document.getElementById('btnA').className=a?'admin-active':'';
        document.getElementById('eWrap').style.display=a?'none':'block';
        document.getElementById('uWrap').style.display=a?'block':'none';
        document.getElementById('ttl').textContent=a?'Admin Login':'Student Login';
        document.getElementById('sub').textContent=a?'Enter staff credentials':'Enter your WMSU credentials';
        document.getElementById('sbtn').textContent=a?'Login as Admin':'Login as Student';
        document.getElementById('sbtn').className=a?'btn admin':'btn';
        document.getElementById('hint').innerHTML=a?'<strong>Admin Demo:</strong> admin / wmsu2026 &nbsp;|&nbsp; window1 / teller1':'<strong>Demo:</strong> juandelacruz@wmsu.edu.ph | any password';
        document.getElementById('err').style.display='none';
    }
    document.getElementById('frm').addEventListener('submit',function(e){
        e.preventDefault();
        const pw=document.getElementById('pw').value;
        const err=document.getElementById('err');
        if(role==='admin'){
            const u=document.getElementById('uname').value.trim();
            const m=admins.find(a=>a.u===u&&a.p===pw);
            if(!m){err.textContent='Invalid username or password.';err.style.display='block';return;}
            sessionStorage.setItem('adminName',m.n);sessionStorage.setItem('adminRole',m.r);
            window.location.href='admin-dashboard.html';
        } else {
            const em=document.getElementById('email').value.trim();
            if(!em.endsWith('@wmsu.edu.ph')){err.textContent='Use your WMSU email (@wmsu.edu.ph)';err.style.display='block';return;}
            const name=em.split('@')[0].replace(/[._]/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
            sessionStorage.setItem('userName',name);sessionStorage.setItem('userEmail',em);
            window.location.href='../student-landing-page/main.html';
        }
    });
</script>
</body>
</html>
