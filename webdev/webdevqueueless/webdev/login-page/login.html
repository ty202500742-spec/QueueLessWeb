<!DOCTYPE html>
<html>
<head>
    <title>Queueless | WMSU Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <img src="../images/wmsu.jpg" alt="WMSU Background" style="width: 100%; height: 100%; object-fit: cover; position: fixed; top: 0; left: 0; z-index: -1;">
<!-- Hidden checkbox controls the tab state -->
<input type="checkbox" id="toggle-admin">

<div class="card">

    <!-- Toggle Tabs -->
    <div class="toggle">
        <label for="toggle-student" >Student</label>
        <label for="toggle-admin" >Admin</label>
    </div>

    <!-- STUDENT FORM -->
    <div class="student-form">
        <div class="form-title">
            <h2>Student Login</h2>
            <p class="sub">Enter your WMSU credentials</p>
        </div>
        <form action="../student-landing-page/main.html" method="get">
            <label for="s-email">Email</label>
            <input type="email" id="s-email" name="email" placeholder="student@wmsu.edu.ph" required>
            <label for="s-pw">Password</label>
            <input type="password" id="s-pw" name="password" placeholder="Password" required>
            <button type="submit" class="btn">Login as Student</button>
        </form>
    </div>

    <!-- ADMIN FORM -->
    <div class="admin-form">
        <div class="form-title">
            <h2>Admin Login</h2>
            <p class="sub">Enter staff credentials</p>
        </div>
        <form action="../ADMIN-DASHBOARD/Dashboard.html" method="get">
            <label for="a-user">Username</label>
            <input type="text" id="a-user" name="username" placeholder="Admin username" required autocomplete="off">
            <label for="a-pw">Password</label>
            <input type="password" id="a-pw" name="password" placeholder="Password" required>
            <button type="submit" class="btn">Login as Admin</button>
        </form>
    </div>

</div>

</body>
</html>
