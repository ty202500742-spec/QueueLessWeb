<!DOCTYPE html>
<html>
<head>
    <title>Queueless | WMSU Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
</head>
<body>

<img src="../images/wmsu.jpg" alt="WMSU Background"
style="width:100%; height:100%; object-fit:cover; position:fixed; top:0; left:0; z-index:-1;">

<!-- RADIO BUTTONS -->
<input type="radio" name="tab" id="toggle-student" checked>
<input type="radio" name="tab" id="toggle-nonstudent">
<input type="radio" name="tab" id="toggle-admin">

<div class="card">

    <!-- LOGO -->
    <div class="logo-container">
        <img src="../images/UEUELESS.png" alt="Queueless Logo" class="logo">
    </div>

    <!-- Toggle Tabs -->
    <div class="toggle">
        <label for="toggle-student">Student</label>
        <label for="toggle-nonstudent">Non-student</label>
        <label for="toggle-admin">Admin</label>
    </div>

    <!-- STUDENT FORM -->
    <div class="student-form">
        <div class="form-title">
            <h2>Student Login</h2>
            <p class="sub">Enter your WMSU credentials</p>
        </div>

        <form action="../student-landing-page/main.html" method="get">
            <label>Email</label>
            <input type="email" placeholder="student@wmsu.edu.ph" required>

            <label>Password</label>
            <input type="password" placeholder="Password" required>
            <button type="submit" class="btn">Login as Student</button>
        </form>
    </div>

    <!-- NON-STUDENT FORM -->
    <div class="nonstudent-form">
        <div class="form-title">
            <h2>Non-Student Login</h2>
            <p class="sub">Enter your credentials</p>
        </div>

        <form action="../student-landing-page/main.html" method="get">
            <label>Email</label>
            <input type="email" placeholder="nonstudent@email.com" required>

            <label>Password</label>
            <input type="password" placeholder="Password" required>
            <button type="submit" class="btn">Login as Non-Student</button>
        </form>
    </div>

    <!-- ADMIN FORM -->
    <div class="admin-form">
        <div class="form-title">
            <h2>Admin Login</h2>
            <p class="sub">Enter staff credentials</p>
        </div>

        <form action="../ADMIN-DASHBOARD/Admin-Dashboard.html" method="get">
            <label>Username</label>
            <input type="text" placeholder="Admin username" required>

            <label>Password</label>
            <input type="password" placeholder="Password" required>
          
            <button type="submit" class="btn">Login as Admin</button>
        </form>
    </div>

</div>

</body>
</html>
