<!DOCTYPE html>

<html>

<head>
    <title>Queueless | WMSU Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../assets/css/nonSlogin.css">
</head>

<body>

    ```
    <!-- Background -->
    <img src="../../assets/images/wmsu.jpg" alt="WMSU Background"
        style="width:100%; height:100%; object-fit:cover; position:fixed; top:0; left:0; z-index:-1;">

    <div class="card">

        <!-- Logo -->
        <div class="logo-container">
            <img src="../../assets/images/UEUELESS.png" alt="Queueless Logo" class="logo">
        </div>

        <!-- FORM -->
        <div class="form-container">
            <div class="form-title">
                <h2>Sign Up</h2>
                <p class="sub">Enter your credentials</p>
            </div>

            <form action="../student-landing-page/nonS-main.html" method="get">

                <label>Enter your Name:</label>
                <div> <input type="text" name="firstName" placeholder="First Name" required> <input type="text"
                        name="middleName" placeholder="Middle (Optional)"> <input type="text" name="lastName"
                        placeholder="Last Name" required> </div>
                <div>
                    <div> <label>Enter your Birthday:</label> <input type="date" name="birthday" id="birthday" max="2020-12-31" required> </div>
                    <div> <label>Enter your Gender:</label>
                        <div class="gender-min"> 
                            <label><input type="radio" name="gender" value="male" required>Male</label>
                            <label><input type="radio" name="gender" value="female"> Female</label>
                            <label><input type="radio" name="gender" value="other"> Other</label>
                        </div>
                    </div>
                </div>
                <div>
                    <div> <label>Enter your Email:</label> <input type="email" name="email" placeholder="email@gmail.com" required>
                    </div>
                    <div> <label>Enter your Phone Number:</label> <input type="text" name="phone" placeholder="0912..."> </div>
                </div>
                <div> 
                    <label>Enter your Password:</label>
                    <input type="password" name="password" placeholder="Password" required>
                    <label>Confirm your Password:</label>
                    <input type="password" name="confirmPassword" placeholder="Confirm Password" required> </div>
                    
                    <button type="submit" class="btn">Sign Up</button>

            </form>
        </div>

    </div>
    ```


</body>

</html>
