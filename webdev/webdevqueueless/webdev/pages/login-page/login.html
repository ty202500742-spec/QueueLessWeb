<!DOCTYPE html>

<html>

<head>
    <title>Queueless | WMSU Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../assets/css/login.css">
</head>

<body>



<img src="../../assets/images/wmsu.jpg" alt="WMSU Background" class="bg-image">

<div class="card">

    <!-- Logo -->
    <div class="logo-container">
        <img src="../../assets/images/UEUELESS.png" alt="Queueless Logo" class="logo">
    </div>

    <!-- FORM -->
    <div class="form-container">
        <div class="form-title">
            <h2>Join Queue</h2>
            <p class="sub">Enter your details to get your queue number</p>
        </div>

        <form onsubmit="handleEntry(event)">

            <label for="fullName">Full Name</label>
            <input type="text" name="fullName" placeholder="Juan Dela Cruz" required>

            <label>User Type</label>
            <select name="userType" required>
                <option value="student">WMSU Student</option>
                <option value="faculty">WMSU Faculty</option>
                <option value="guest">Non-Student/Guest</option>
                <option value="priority">Priority (PWD/Senior Citizen)</option>
            </select>

            <label>Email Address</label>
            <input type="email" name="email" id="emailInput" placeholder="student@wmsu.edu.ph" required>

            <label>ID Number (Leave blank if Guest)</label>
            <input type="text" name="idNumber" placeholder="2025-12345">

            <button type="submit" class="submit-btn">Get Queue Number</button>

        </form>
    </div>

</div>

<script src="../../assets/js/login.js"></script>

</body>

</html>
