<!DOCTYPE html>

<html>

<head>
    <title>Queueless | WMSU Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../assets/css/login.css">
</head>

<body>



<img src="../../assets/images/wmsu.jpg" alt="WMSU Background"
    style="width:100%; height:100%; object-fit:cover; position:fixed; top:0; left:0; z-index:-1;">

<div class="card">

    <!-- Logo -->
    <div class="logo-container">
        <img src="../../assets/images/UEUELESS.png" alt="Queueless Logo" class="logo">
    </div>

    <!-- FORM -->
    <div class="form-container">
        <div class="form-title">
            <h2>Login</h2>
            <p class="sub">Enter your WMSU credentials</p>
        </div>

        <form onsubmit="handleLogin(event)">

            <label>Email</label>
            <input type="email" name="email" placeholder="student@wmsu.edu.ph" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit" class="btn">Login</button>

            <a href="nonS-login.html" class="nonsignup">
                Don't have an account? Sign up
            </a>

        </form>
    </div>

</div>

<script src="../../assets/js/login.js"></script>

</body>

</html>
