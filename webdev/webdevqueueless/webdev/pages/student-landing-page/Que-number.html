<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../assets/css/quenumber.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queueuless | Queue</title>

</head>

<body>

     <nav>
        <!-- ========== HAMBURGER BUTTON (place this in your topbar) ========== -->
<button class="hamburger" id="ham" onclick="toggleSidebar()" aria-label="Open menu">
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
</button>

<!-- ========== OVERLAY ========== -->
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- ========== SIDEBAR ========== -->
<div class="sidebar" id="sidebar">

  <!-- Header -->
  <div class="sb-header">
    <span class="sb-title">Menu</span>
    <button class="close-btn" onclick="closeSidebar()" aria-label="Close">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- Profile -->
  <div class="profile-section">
    <div class="avatar">JD</div>
    <div class="profile-name">Juan dela Cruz</div>
    <div class="profile-email">juan@school.edu.ph</div>
    <span class="role-pill registrar" id="role-pill">
      <span class="role-dot"></span>
      <span id="role-label">Registrar</span>
    </span>
  </div>

  <!-- Navigation -->
  <div class="section-label">Navigation</div>

  <div class="nav-item active" onclick="dashboardgo()">
    <div class="nav-icon blue">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="2" y="2" width="5" height="5" rx="1" fill="#185FA5"/>
        <rect x="9" y="2" width="5" height="5" rx="1" fill="#185FA5"/>
        <rect x="2" y="9" width="5" height="5" rx="1" fill="#185FA5"/>
        <rect x="9" y="9" width="5" height="5" rx="1" fill="#185FA5"/>
      </svg>
    </div>
    Dashboard
  </div>

  <div class="nav-item" onclick="historygo()">
    <div class="nav-icon amber">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="6" stroke="#BA7517" stroke-width="1.4"/>
        <path d="M8 5v3l2 2" stroke="#BA7517" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
    </div>
    History
    <span class="history-badge">12</span>
  </div>

  <div class="nav-item" onclick="profilego()">
    <div class="nav-icon coral">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="6" r="3" stroke="#993C1D" stroke-width="1.4"/>
        <path d="M2 14c0-3.314 2.686-4 6-4s6 .686 6 4" stroke="#993C1D" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
    </div>
    Profile
  </div>

  <!-- Switch Role -->
  <div class="role-section">
    <div class="role-label">Switch role</div>
    <div class="role-toggle">
      <button class="role-btn selected reg" id="btn-reg" onclick="setRole('registrar')">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <rect x="1" y="1" width="11" height="11" rx="2" stroke="currentColor" stroke-width="1.3"/>
          <path d="M4 6.5h5M4 4.5h5M4 8.5h3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        Registrar
      </button>
      <button class="role-btn cash" id="btn-cash" onclick="setRole('cashier')">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <rect x="1" y="3" width="11" height="8" rx="2" stroke="currentColor" stroke-width="1.3"/>
          <path d="M1 6h11" stroke="currentColor" stroke-width="1.3"/>
          <circle cx="4.5" cy="8.5" r="0.8" fill="currentColor"/>
          <circle cx="6.5" cy="8.5" r="0.8" fill="currentColor"/>
        </svg>
        Cashier
      </button>
    </div>
  </div>

  <!-- Footer / Logout -->
  <div class="sb-footer">
    <div class="nav-item logout">
      <div class="nav-icon gray">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M6 14H3a1 1 0 01-1-1V3a1 1 0 011-1h3M10.5 11.5l3-3.5-3-3.5M13.5 8H6"
            stroke="#6b7280" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span>Log out</span>
    </div>
  </div>

</div>

        </ul>

         <a href="main.html" class="nav-logo-link">
            <img src="../../assets/images/UEUELESS.png" alt="QueueLess | WMSU" class="nav-logo-img">
        </a>
    </nav>

    <div class="bodd1">
        <div class="bodd2">
            <div class="queue-container">
                <h1>Now in Queue for</h1>

                <div id="currentNumber" class="current-number">---</div>
                <div id="statusMessage" class="status-message">Loading your position...</div>

                <ul id="queueList" class="queue-list">
                    <!-- Queue items will be added here dynamically -->
                </ul>

                <a href="#" class="cancel-btn" onclick="cancelQueue()">Cancel Queue</a>
            </div>
        </div>
    </div>

    <footer>
        © 2026 Queueuless | Western Mindanao State University
    </footer>

    <script src="../../assets/js/quenum.js"></script>
